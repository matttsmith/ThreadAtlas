name: test

# ThreadAtlas is a fully-local tool. Tests must pass WITHOUT network access at
# runtime. CI is the only place we explicitly run them in a sandbox, so this
# workflow is kept intentionally small and dependency-light.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  full-test-suite:
    name: "Tests (Python ${{ matrix.python }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          # Ensure tests/fake_llm is importable as a module in subprocess paths.
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

  no-network-guard:
    # Isolates the privacy invariant: even if the full suite regresses, this
    # lightweight job flags any new networking import in the runtime package.
    name: "No-network import guard"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run no-network tests only
        run: pytest -q tests/test_no_network.py
